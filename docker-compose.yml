services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prdbot
      POSTGRES_PASSWORD: prdbot
      POSTGRES_DB: prdbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
